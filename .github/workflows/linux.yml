# Auto-generated file, see workflow-templates/linux.yml

on:
  push:
    paths:
      - '.github/workflows/linux.yml'
      - '.github/workflows/run-linux'
name: Linux
jobs:
  list:
    name: list available perl versions
    runs-on: 'ubuntu-latest'
    steps:
      - uses: shogo82148/actions-setup-perl@v1
      - id: set-matrix
        name: list available perl versions
        shell: perl {0}
        run: |
          use Actions::Core;
          set_output(matrix => {perl => [grep { $_ !~ /^5\.6\./ } perl_versions()]});
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
  build:
    runs-on: 'ubuntu-latest'
    needs: list
    strategy:
      fail-fast: false
      matrix: ${{fromJson(needs.list.outputs.matrix)}}
    name: Perl ${{ matrix.perl }}
    steps:
      - name: check out code
        uses: actions/checkout@v6
      - name: switch to perl ${{ matrix.perl }}
        uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: ${{ matrix.perl }}
      - name: run tests
        env:
          PERL_USE_UNSAFE_INC: 0
        run: |
            perl -v
            cpanm Expect
            cpanm ExtUtils::MakeMaker Test::Pod Test::Pod::Coverage
            perl -Mparent -e0 || cpanm parent
            cpanm --installdeps .
            perl makefile-expect-driver.pl Linux::Debian Linux::Ubuntu Linux Unix OSFeatures::Systemd OSFeatures::POSIXShellRedirection HWCapabilities::Int64
            make test TEST_VERBOSE=1
